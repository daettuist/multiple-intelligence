<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 다중지능 검사</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root {
  --bg: #FFF9F0;
  --text: #2d2d2d;
  --muted: #888;
  --radius: 20px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}
.app { width: 100%; max-width: 680px; }
.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ─── 인트로 ─── */
.intro-wrap { text-align: center; padding: 32px 20px 20px; }
.intro-person { margin: 0 auto 20px; width: 110px; height: 110px; }
.intro-title {
  font-family: 'Gaegu', cursive;
  font-size: 40px; font-weight: 700;
  line-height: 1.2; margin-bottom: 12px;
}
.intro-sub {
  font-size: 15px; color: var(--muted);
  margin-bottom: 28px; line-height: 1.7;
}

/* ① 4×2 그리드 배지 */
.badges {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 32px;
}
.badge {
  padding: 10px 6px;
  border-radius: 12px;
  font-size: 12px; font-weight: 700;
  color: #fff; text-align: center;
  line-height: 1.6;
}

.btn-start {
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white; border: none;
  padding: 18px 48px; border-radius: 999px;
  font-size: 20px; font-family: 'Gaegu', cursive; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,107,.35);
  transition: transform .15s, box-shadow .15s;
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,107,.4); }
.btn-start:active { transform: scale(.97); }

.info-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-top: 32px;
}
.info-card {
  background: white; border-radius: 16px;
  padding: 18px 12px; text-align: center;
  box-shadow: var(--shadow);
}
.info-card .ic-emoji { font-size: 28px; margin-bottom: 8px; }
.info-card .ic-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.info-card .ic-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ─── 진행바 ─── */
.progress-area { padding: 20px 0 0; }
.progress-label {
  font-size: 13px; color: var(--muted);
  margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center;
}
.prog-left { font-size: 13px; color: var(--muted); }
.prog-left strong { color: var(--text); font-size: 15px; }
.prog-right { color: #FF6B6B; font-weight: 700; font-size: 13px; }
.progress-bar-wrap {
  background: #eee; border-radius: 999px;
  height: 10px; margin-bottom: 20px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, #FF6B6B, #FF8E53);
  transition: width .4s ease;
}

/* ─── 문항 카드 ─── */
.question-card {
  background: white; border-radius: 16px;
  padding: 22px 20px; margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.question-meta {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 14px;
}
.q-domain-badge {
  padding: 5px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 700; color: white;
}
.question-text {
  font-size: 15px; font-weight: 500;
  margin-bottom: 20px; line-height: 1.7;
}

/* ⑦ 척도 버튼 */
.score-btns { display: flex; gap: 6px; }
.score-btn {
  flex: 1; padding: 10px 2px;
  border: 2px solid #eee; border-radius: 12px;
  background: white; cursor: pointer;
  transition: all .15s;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  color: var(--muted);
}
.score-btn .s-num {
  font-size: 18px;
  font-family: 'Gaegu', cursive; font-weight: 700;
}
.score-btn .s-txt { font-size: 9px; line-height: 1.3; text-align: center; word-break: keep-all; }
.score-btn:hover { border-color: #FF6B6B; color: #FF6B6B; }
.score-btn.selected { color: white; }

/* ⑥ 이전/다음 */
.nav-row { display: flex; gap: 12px; margin-top: 20px; margin-bottom: 30px; }
.btn-prev {
  padding: 14px 24px; border-radius: 999px;
  border: 2px solid #ddd; background: white;
  font-size: 15px; font-weight: 700;
  cursor: pointer; color: var(--muted);
  transition: all .15s; white-space: nowrap;
}
.btn-prev:hover:not(:disabled) { border-color: #aaa; color: var(--text); }
.btn-prev:disabled { opacity: .3; cursor: not-allowed; }
.btn-next {
  flex: 1; padding: 14px;
  border-radius: 999px; border: none;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white; font-size: 16px; font-weight: 700;
  font-family: 'Gaegu', cursive; cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,107,.3);
  transition: all .15s;
}
.btn-next:hover:not(:disabled) { transform: translateY(-1px); }
.btn-next:disabled { background: #ddd; box-shadow: none; color: #aaa; cursor: not-allowed; transform: none; }

/* ─── 결과 ─── */
.result-header { text-align: center; padding: 32px 20px 24px; }
.result-title { font-family: 'Gaegu', cursive; font-size: 32px; font-weight: 700; margin-bottom: 6px; }
.result-sub { font-size: 14px; color: var(--muted); }
.character-card {
  background: white; border-radius: var(--radius);
  padding: 28px 24px; margin-bottom: 16px;
  box-shadow: var(--shadow); text-align: center;
}
.char-svg-wrap { margin: 0 auto 16px; width: 140px; height: 140px; }
.char-svg-wrap svg { width: 100%; height: 100%; }
.char-nickname { font-family: 'Gaegu', cursive; font-size: 30px; font-weight: 700; margin-bottom: 8px; }
.char-combo-tags { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
.char-tag { padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; color: white; }
.char-desc { font-size: 14px; color: #555; line-height: 1.8; }
.people-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 16px; }
.person-chip {
  background: #f8f8f8; border-radius: 12px;
  padding: 10px 12px; display: flex; align-items: center; gap: 8px;
}
.person-chip .p-icon { font-size: 20px; }
.person-chip .p-name { font-weight: 700; font-size: 13px; }
.person-chip .p-role { color: var(--muted); font-size: 11px; }
.chart-card {
  background: white; border-radius: var(--radius);
  padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow);
}
.chart-card h3 { font-family: 'Gaegu', cursive; font-size: 20px; margin-bottom: 16px; text-align: center; }
.chart-wrap { position: relative; height: 280px; }
.scores-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 16px; }
.score-chip { background: #f8f8f8; border-radius: 14px; padding: 12px 8px; text-align: center; }
.score-chip .sc-emoji { font-size: 20px; margin-bottom: 4px; }
.score-chip .sc-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.score-chip .sc-score { font-size: 18px; font-weight: 700; font-family: 'Gaegu', cursive; }
.score-chip.top { border: 2px solid #FF6B6B; background: #fff5f5; }
.share-row { display: flex; gap: 10px; margin-top: 8px; margin-bottom: 16px; }
.btn-save-img {
  flex: 1; padding: 16px; border-radius: 999px; border: none;
  background: linear-gradient(135deg, #43C6AC, #191654);
  color: white; font-size: 16px; font-weight: 700;
  font-family: 'Gaegu', cursive; cursor: pointer;
  box-shadow: 0 4px 16px rgba(67,198,172,.35);
  transition: all .15s;
}
.btn-save-img:hover { transform: translateY(-2px); }
.btn-kakao {
  width: 100%; padding: 16px; border-radius: 999px; border: none;
  background: #FEE500;
  color: #3A1D1D; font-size: 17px; font-weight: 700;
  font-family: 'Gaegu', cursive; cursor: pointer;
  margin-top: 8px; margin-bottom: 12px;
  box-shadow: 0 4px 16px rgba(254,229,0,.4);
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.btn-kakao:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(254,229,0,.5); }
.btn-retry {
  width: 100%; padding: 18px; border-radius: 999px; border: none;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  color: white; font-size: 18px; font-weight: 700;
  font-family: 'Gaegu', cursive; cursor: pointer;
  margin-bottom: 40px;
  box-shadow: 0 6px 20px rgba(255,107,107,.35);
  transition: all .15s;
}
.btn-retry:hover { transform: translateY(-2px); }
/* 이미지 저장용 공유 카드 */
#share-card {
  position: fixed; left: -9999px; top: 0;
  width: 360px; background: #FFF9F0;
  padding: 32px 24px; font-family: 'Noto Sans KR', sans-serif;
}
#share-card .sc-title {
  font-family: 'Gaegu', cursive; font-size: 28px; font-weight: 700;
  text-align: center; margin-bottom: 4px;
}
#share-card .sc-sub {
  text-align: center; font-size: 13px; color: #888; margin-bottom: 20px;
}
#share-card .sc-nick {
  font-family: 'Gaegu', cursive; font-size: 26px; font-weight: 700;
  text-align: center; margin: 12px 0 6px;
}
#share-card .sc-desc {
  font-size: 13px; color: #555; line-height: 1.7;
  text-align: center; margin-bottom: 20px;
}
#share-card .sc-tags {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 20px;
}
#share-card .sc-tag {
  padding: 5px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 700; color: white;
}
#share-card .sc-bars { margin-bottom: 16px; }
#share-card .sc-bar-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
#share-card .sc-bar-label { font-size: 11px; font-weight: 700; width: 52px; flex-shrink: 0; }
#share-card .sc-bar-bg {
  flex: 1; height: 12px; background: #eee; border-radius: 999px; overflow: hidden;
}
#share-card .sc-bar-fill { height: 100%; border-radius: 999px; }
#share-card .sc-bar-score { font-size: 11px; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }
#share-card .sc-footer {
  text-align: center; font-size: 11px; color: #bbb; margin-top: 16px;
}
.section-divider {
  text-align: center; font-size: 13px; color: var(--muted);
  margin: 6px 0 14px; font-weight: 700; letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="app">

<!-- ════ 인트로 ════ -->
<div class="screen active" id="screen-intro">
  <div class="intro-wrap">

    <!-- 다중지능 일러스트 -->
    <div style="margin:0 auto 20px;max-width:400px">
      <svg width="100%" viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg">
        <!-- 연결선 -->
        <line x1="200" y1="44" x2="200" y2="18" stroke="#FF6B6B" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="200" y1="86" x2="200" y2="112" stroke="#4ECDC4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="178" y1="65" x2="148" y2="65" stroke="#45B7D1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="222" y1="65" x2="252" y2="65" stroke="#96CEB4" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="182" y1="49" x2="158" y2="26" stroke="#E8A87C" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="218" y1="49" x2="242" y2="26" stroke="#DDA0DD" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="182" y1="81" x2="158" y2="104" stroke="#98D8C8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="218" y1="81" x2="242" y2="104" stroke="#D4AC0D" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <!-- 중앙 원 -->
        <circle cx="200" cy="65" r="24" fill="#FFF3E8"/>
        <circle cx="200" cy="65" r="24" fill="none" stroke="#FF6B6B" stroke-width="2"/>
        <ellipse cx="200" cy="59" rx="10" ry="11" fill="#FF6B6B" opacity="0.85"/>
        <ellipse cx="200" cy="73" rx="11" ry="8" fill="#FF6B6B" opacity="0.85"/>
        <circle cx="211" cy="53" r="2" fill="#FFD700"/>
        <circle cx="189" cy="56" r="1.5" fill="#FFD700"/>

        <circle cx="200" cy="13" r="14" fill="#FF6B6B"/>
        <rect x="192" y="7" width="16" height="10" rx="3" fill="white" opacity="0.9"/>
        <polygon points="196,17 204,17 200,22" fill="white" opacity="0.9"/>
        <line x1="194" y1="10" x2="206" y2="10" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="194" y1="13" x2="203" y2="13" stroke="#FF6B6B" stroke-width="1.5" stroke-linecap="round"/>
        <!-- B 논리수학 (아래) -->
        <circle cx="200" cy="117" r="14" fill="#4ECDC4"/>
        <text x="200" y="122" text-anchor="middle" font-size="14" font-family="sans-serif" font-weight="700" fill="white">&#x2211;</text>
        <!-- C 신체운동 (왼쪽) -->
        <circle cx="133" cy="65" r="14" fill="#45B7D1"/>
        <circle cx="133" cy="57" r="3.5" fill="white" opacity="0.9"/>
        <line x1="133" y1="61" x2="133" y2="68" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="133" y1="63" x2="128" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="133" y1="63" x2="138" y2="67" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="133" y1="68" x2="129" y2="73" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="133" y1="68" x2="137" y2="73" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

        <circle cx="267" cy="65" r="14" fill="#96CEB4"/>

        <circle cx="152" cy="20" r="14" fill="#E8A87C"/>
        <circle cx="152" cy="20" r="7" fill="white" opacity="0.9"/>
        <polygon points="152,13 153.5,20 152,21.5 150.5,20" fill="#E8A87C"/>

        <circle cx="248" cy="20" r="14" fill="#DDA0DD"/>

    </div>

    <div class="intro-title">나의 다중지능<br>검사</div>
    <div class="intro-sub">
      하워드 가드너의 8가지 다중지능 이론을 바탕으로<br>
      나만의 강점 지능을 발견해 보세요!

    <button class="btn-start" onclick="startTest()">검사 시작하기 →</button>

        <div class="ic-emoji">⏱</div>

<!-- ════ 검사 ════ -->
<div class="screen" id="screen-test">
  <div class="progress-area">
    <!-- ④ 진도율 N / 56 -->
    <div class="progress-label">
      <span class="prog-left">진도율 <strong id="prog-cur">1</strong> / 56</span>
      <span class="prog-right" id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>

    <!-- ⑤ 섹션 헤더 없음 -->
    <div id="question-content"></div>

    <!-- ⑥ 이전/다음 -->
    <div class="nav-row">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">다음 →</button>
    </div>
  </div>
</div>

<!-- ════ 결과 ════ -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <div class="result-title">🎉 결과가 나왔어요!</div>
    <div class="result-sub">나만의 강점 지능 조합을 확인해보세요</div>
  </div>
  <div id="result-content"></div>
  <button class="btn-kakao" onclick="shareKakao()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:6px"><path d="M12 2C6.477 2 2 5.813 2 10.5c0 2.97 1.793 5.576 4.5 7.128L5.5 22l5.09-2.668C11.048 19.443 11.517 19.5 12 19.5c5.523 0 10-3.813 10-8.5S17.523 2 12 2z" fill="#3A1D1D"/></svg>
    카카오톡으로 공유하기
  </button>
  <button class="btn-retry" onclick="resetTest()">🔄 다시 검사하기</button>

</div>

<script>
/* ══ 상수 정의 먼저 ══ */
const KEYS  = ['A','B','C','D','E','F','G','H'];
const TOTAL = 56; // 8 영역 × 7 문항

/* 카카오 SDK 초기화 */
window.addEventListener('load', () => {
  Kakao.init('2f025a7f3b5711acf329546104d478b5');
});

/* 카카오 공유 함수 — showResult()에서 결과 저장 후 호출 */
let _shareNick = '';
let _shareDesc = '';
let _shareTop2Names = '';

function shareKakao() {
  const pageUrl = window.location.href;
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: `나의 다중지능 검사 결과: "${_shareNick}"`,
      description: `${_shareTop2Names}\n${_shareDesc}`,
      imageUrl: 'https://via.placeholder.com/500x260/FFF9F0/FF6B6B?text=나의+다중지능+검사',
      link: { mobileWebUrl: pageUrl, webUrl: pageUrl }
    },
    buttons: [{
      title: '나도 검사해보기 →',
      link: { mobileWebUrl: pageUrl, webUrl: pageUrl }
    }]
  });

/* ══ 상태 ══ */
let answers = {};
let currentQ = 0;

function initAnswers() {
  KEYS.forEach(k => { answers[k] = Array(7).fill(undefined); });
}

/* ══ 화면 전환 ══ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ══ 검사 시작 ══ */
function startTest() {
  initAnswers();
  currentQ = 0;
  showScreen('test');
  renderQ();
}

/* ══ 문항 렌더링
   ③ 인터리브 방식:
   currentQ 0~7  → 각 영역 1번 문항 (round=0)
   currentQ 8~15 → 각 영역 2번 문항 (round=1) ...
   sectionIdx = currentQ % 8
   questionIdx = Math.floor(currentQ / 8)
══ */
function renderQ() {
  const sectionIdx  = currentQ % 8;           // 0~7 → 영역 인덱스
  const questionIdx = Math.floor(currentQ / 8); // 0~6 → 몇 번째 문항
  const sec   = SECTIONS[sectionIdx];
  const qText = sec.questions[questionIdx];
  const saved = answers[sec.key][questionIdx];

  /* ④ 진도율 */
  const cur = currentQ + 1;
  const pct = Math.round((currentQ / TOTAL) * 100);
  document.getElementById('prog-cur').textContent  = cur;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  /* ⑥ 버튼 상태 */
  document.getElementById('btn-prev').disabled = (currentQ === 0);
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = (currentQ === TOTAL - 1) ? '결과 보기 🎉' : '다음 →';
  nextBtn.disabled    = (saved === undefined);

  /* ⑦ 척도 버튼 */
  const labelsHtml = SCORE_LABELS.map((lbl, si) => {
    const val        = si + 1;
    const isSelected = (saved === val);
    const lines      = lbl.split('\n');
    const selStyle   = isSelected
      ? `background:${sec.color};border-color:${sec.color};color:white;`
      : '';
    return `<button class="score-btn${isSelected ? ' selected' : ''}"
      style="${selStyle}"
      onclick="selectScore('${sec.key}',${questionIdx},${val})">
      <span class="s-num">${val}</span>
      <span class="s-txt">${lines.join('<br>')}</span>
    </button>`;
  }).join('');

  document.getElementById('question-content').innerHTML = `
    <div class="question-card">
      <div class="question-text">${qText}</div>
      <div class="score-btns">${labelsHtml}</div>
    </div>`;

  window.scrollTo(0, 0);
}

/* ══ 점수 선택 ══ */
function selectScore(key, questionIdx, score) {
  answers[key][questionIdx] = score;
  const sec = SECTIONS.find(s => s.key === key);

  document.querySelectorAll('.score-btn').forEach((btn, idx) => {
    const val = idx + 1;
    if (val === score) {
      btn.classList.add('selected');
      btn.style.cssText = `background:${sec.color};border-color:${sec.color};color:white;`;
    } else {
      btn.classList.remove('selected');
      btn.style.cssText = '';
    }
  });
  document.getElementById('btn-next').disabled = false;

  /* 자동 다음 이동 */
  setTimeout(() => {
    if (currentQ < TOTAL - 1) {
      currentQ++;
      renderQ();
    } else {
      showResult();
    }
  }, 300);
}

/* ══ 이전/다음 ══ */
function nextQ() {
  const sectionIdx  = currentQ % 8;
  const questionIdx = Math.floor(currentQ / 8);
  if (answers[SECTIONS[sectionIdx].key][questionIdx] === undefined) return;

  if (currentQ < TOTAL - 1) {
    currentQ++;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

/* ══ 결과 ══ */
function showResult() {
  const scores = {};
  KEYS.forEach(k => {
    scores[k] = answers[k].reduce((a, b) => a + (b || 0), 0);
  });

  const sorted = [...KEYS].sort((a, b) => {
    if (scores[b] !== scores[a]) return scores[b] - scores[a];
    const pri = ['G','H','A','B','C','E','D','F'];
    return pri.indexOf(a) - pri.indexOf(b);
  });

  const top2     = sorted.slice(0, 2).sort();
  const comboKey = top2.join('');
  const combo    = COMBOS[comboKey] || { nick:'나만의 천재', desc:'여러 지능이 고루 발달한 균형잡힌 인재예요!' };
  const svgStr   = CHAR_SVGS[comboKey] || CHAR_SVGS['AH'];
  const info1    = MI_INFO[top2[0]];
  const info2    = MI_INFO[top2[1]];

  /* 카카오 공유용 변수 저장 */
  _shareNick      = combo.nick;
  _shareDesc      = combo.desc;
  _shareTop2Names = `${info1.name} + ${info2.name}`;

  const personCard = (key, info) => `
    <div class="character-card" style="text-align:left">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:28px">${SECTIONS[KEYS.indexOf(key)].emoji}</span>
        <div>
          <div style="font-weight:700;font-size:16px;color:${KEY_COLORS[key]}">${info.name}</div>
          <div style="font-size:12px;color:#888">점수: ${scores[key]}점</div>
        </div>
      </div>
      <div class="char-desc" style="margin-bottom:14px">${info.desc}</div>
      <div style="font-size:12px;font-weight:700;color:#aaa;margin-bottom:8px;letter-spacing:1px">대표 인물</div>
      <div class="people-row">
        ${info.people.map(p=>`
          <div class="person-chip">
            <span class="p-icon">${p.icon}</span>
            <div><div class="p-name">${p.name}</div><div class="p-role">${p.role}</div></div>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('result-content').innerHTML = `
    <div class="character-card">
      <div class="char-svg-wrap">${svgStr}</div>
      <div class="char-nickname">${combo.nick}</div>
      <div class="char-combo-tags">
        <span class="char-tag" style="background:${KEY_COLORS[top2[0]]}">${SECTIONS[KEYS.indexOf(top2[0])].emoji} ${info1.name}</span>
        <span class="char-tag" style="background:${KEY_COLORS[top2[1]]}">${SECTIONS[KEYS.indexOf(top2[1])].emoji} ${info2.name}</span>
      </div>
      <div class="char-desc">${combo.desc}</div>
    </div>
    <div class="section-divider">강점 지능 상세</div>
    ${personCard(top2[0], info1)}
    ${personCard(top2[1], info2)}
    <div class="chart-card">
      <h3>📊 나의 8가지 지능 점수</h3>
      <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      <div class="scores-grid">
        ${KEYS.map(k=>`
          <div class="score-chip${top2.includes(k)?' top':''}">
            <div class="sc-emoji">${SECTIONS[KEYS.indexOf(k)].emoji}</div>
            <div class="sc-name">${MI_INFO[k].name.replace(' 지능','')}</div>
            <div class="sc-score" style="color:${KEY_COLORS[k]}">${scores[k]}<span style="font-size:10px;color:#aaa;font-family:'Noto Sans KR',sans-serif;font-weight:400"> /35</span></div>
          </div>`).join('')}
      </div>
    </div>`;

  showScreen('result');
  window.scrollTo(0, 0);

  setTimeout(() => {
    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: KEYS.map(k => MI_INFO[k].name.replace(' 지능','')),
        datasets: [{
          data: KEYS.map(k => scores[k]),
          backgroundColor: 'rgba(255,107,107,0.15)',
          borderColor: '#FF6B6B', borderWidth: 2.5,
          pointBackgroundColor: KEYS.map(k => KEY_COLORS[k]),
          pointRadius: 6, pointHoverRadius: 8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          r: {
            min: 0, max: 35,
            ticks: { stepSize: 7, display: false },
            grid: { color: 'rgba(0,0,0,0.06)' },
            angleLines: { color: 'rgba(0,0,0,0.08)' },
            pointLabels: { font: { size: 11, family: 'Noto Sans KR' }, color: '#666' }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }, 200);
}

function resetTest() {
  answers  = {};
  currentQ = 0;
  showScreen('intro');
  window.scrollTo(0, 0);
}
</script>
